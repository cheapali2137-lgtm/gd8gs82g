<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Admin - Tokeny Jednorazowe</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg,#1a1a1a,#111);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 50px 20px;
  min-height: 100vh;
}
h2 { font-size: 2em; margin-bottom: 20px; text-shadow: 0 0 10px #6a00d4; text-align:center; }
input[type=email], input[type=password], input[type=number], input[type=text] {
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  width: 320px;
  font-size: 18px;
}
button {
  padding: 10px 25px;
  margin: 5px;
  background:#6a00d4;
  border:none;
  border-radius:8px;
  color:white;
  font-size: 16px;
  cursor:pointer;
  transition: 0.3s;
}
button:hover { background:#8500ff; }
#panel { display:none; width:100%; max-width:700px; }
.links { margin-top:20px; display:flex; flex-direction:column; gap:10px; }
.link-item {
  display:flex;
  justify-content: space-between;
  align-items: center;
  background: #222;
  padding: 10px 15px;
  border-radius: 12px;
  font-size: 16px;
  word-break: break-all;
  box-shadow: 0 0 10px rgba(106,0,212,0.4);
}
.link-item button {
  padding: 6px 12px;
  font-size: 14px;
}
#loginError { color: #f33; margin-top:5px; font-size:16px; }
</style>
</head>
<body>

<h2>Panel Admin - Logowanie</h2>

<div id="loginForm">
  <input id="email" type="email" placeholder="Email admina"><br>
  <input id="password" type="password" placeholder="Hasło"><br>
  <button id="loginBtn">Zaloguj</button>
  <div id="loginError"></div>
</div>

<div id="panel">
  <h2>Generowanie tokenów</h2>
  <label>Ile tokenów wygenerować?</label><br>
  <input id="count" type="number" value="10" min="1" max="1000"><br>

  <label>Długość tokenu</label><br>
  <input id="length" type="number" value="20" min="8" max="64"><br>

  <label>Twój link</label><br>
  <input id="prefix" type="text" value="https://m-obywatelek-67.vercel.app/index.html?token=" style="width:320px"><br>

  <button id="genBtn">Generuj i zapisz w Firebase</button>
  <button id="localBtn">Generuj lokalnie</button>

  <p class="small">Lista tokenów / linków:</p>
  <div id="out" class="links"></div>
</div>

<script type="module">
const countEl = document.getElementById("count");
const lengthEl = document.getElementById("length");
const prefixEl = document.getElementById("prefix");
const outEl = document.getElementById("out");
const localBtn = document.getElementById("localBtn");

let lastGenerated = [];

// Panel is always visible now since we removed authentication
document.getElementById("loginForm").style.display = "none";
document.getElementById("genBtn").style.display = "none"; // Ukrywamy przycisk zapisu do Firebase
document.getElementById("panel").style.display = "block";

// --- TOKENY ---
function randToken(len){
  const alphabet="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_-";
  const arr=new Uint8Array(len);
  crypto.getRandomValues(arr);
  let s="";
  for(let i=0;i<len;i++){ s+=alphabet[arr[i]%alphabet.length]; }
  return s;
}

function generateTokens(count,len,prefix){
  const set=new Set();
  const arr=[];
  while(arr.length<count){
    const t=randToken(len);
    if(!set.has(t)){
      set.add(t);
      arr.push({token:t,link:prefix+encodeURIComponent(t)});
    }
  }
  return arr;
}

function renderList(list){
  outEl.innerHTML = "";
  if(list.length===0) return;
  list.forEach(item=>{
    const div = document.createElement("div");
    div.className="link-item";
    div.innerHTML = `<span>${item.link}</span> <button>📋 Kopiuj</button>`;
    const btn = div.querySelector("button");
    btn.onclick = ()=>{ navigator.clipboard.writeText(item.link); btn.textContent="✅ Skopiowano"; setTimeout(()=>btn.textContent="📋 Kopiuj",1000);}
    outEl.appendChild(div);
  });
}

// --- OBSŁUGA PRZYCISKÓW ---
localBtn.addEventListener("click",()=>{
  const count=Math.min(1000,Math.max(1,Number(countEl.value)||10));
  const len=Math.min(64,Math.max(8,Number(lengthEl.value)||20));
  const prefix=(prefixEl.value||"").trim();
  const list=generateTokens(count,len,prefix);
  lastGenerated=list;
  renderList(list);
});
</script>

</body>
</html>
